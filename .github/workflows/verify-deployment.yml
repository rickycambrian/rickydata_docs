name: Verify Docs Deployment

on:
  workflow_run:
    workflows:
      - "Deploy Docs Platform"
    types:
      - completed
  workflow_dispatch:

env:
  REGION: us-central1
  API_SERVICE: rickydata-docs-api
  WEB_SERVICE: rickydata-docs-web

jobs:
  verify:
    name: Verify Production
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      issues: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve service URLs
        id: urls
        run: |
          API_URL=$(gcloud run services describe ${{ env.API_SERVICE }} \
            --region=${{ env.REGION }} --format='value(status.url)' 2>/dev/null || echo "")
          WEB_URL=$(gcloud run services describe ${{ env.WEB_SERVICE }} \
            --region=${{ env.REGION }} --format='value(status.url)' 2>/dev/null || echo "")
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "web_url=$WEB_URL" >> $GITHUB_OUTPUT
          echo "API URL: $API_URL"
          echo "Web URL: $WEB_URL"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for deployment to be live
        run: |
          API_URL="${{ steps.urls.outputs.api_url }}"
          if [ -z "$API_URL" ]; then
            echo "Could not resolve API URL"
            exit 1
          fi
          for i in $(seq 1 20); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "$API_URL/health" || echo "000")
            echo "Attempt $i/20: HTTP $CODE"
            if [ "$CODE" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "API did not become healthy"
          exit 1

      - name: Run verification
        id: verify
        run: |
          set +e
          node .github/scripts/verify-deployment.mjs \
            "${{ steps.urls.outputs.api_url }}" \
            "${{ steps.urls.outputs.web_url }}" \
            2>&1 1>/tmp/verify-results.json
          EXIT_CODE=$?
          set -e

          RESULTS=$(cat /tmp/verify-results.json)
          echo "json<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 0 ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
          fi
          exit $EXIT_CODE

      - name: Report success
        if: steps.verify.outputs.result == 'success'
        run: |
          echo "## Docs Deployment Verification: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All checks passed." >> $GITHUB_STEP_SUMMARY

      - name: Report failure — create issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run?.head_sha || context.sha;
            const title = `[Deploy Verification] Docs deployment check failed (${sha.substring(0, 7)})`;
            const body = `## Docs Deployment Verification Failed\n\n**Commit:** \`${sha}\`\n**Time:** ${new Date().toISOString()}\n\nSee [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'deploy-verification', per_page: 5,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: 'deploy-verification', color: 'e11d48',
                  description: 'Automated post-deployment verification failure',
                });
              } catch {}
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['deploy-verification'],
              });
            }
