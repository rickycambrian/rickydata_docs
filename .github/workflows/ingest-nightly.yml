name: Nightly Docs Ingest

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Run full ingest
        run: |
          curl -fsS -X POST "${{ secrets.DOCS_API_URL }}/api/internal/ingest/run" \
            -H "Authorization: Bearer ${{ secrets.INGEST_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}'
