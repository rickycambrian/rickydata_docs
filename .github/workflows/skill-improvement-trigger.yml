name: Skill Improvement Trigger

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/skills/**'
      - '.claude/agents/**'
      - '**/*.md'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && github.actor != 'dependabot[bot]'
    steps:
      - name: Collect changed files
        id: changes
        run: |
          FILES=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --jq '[.files[].filename] | join(",")')
          echo "files=$FILES" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger skill analysis via Gateway API
        run: |
          # Route through the Agent Gateway — no cross-repo PAT needed.
          # The gateway uses its GitHub App installation token to dispatch to ai_research.
          curl -sf -X POST "https://agents.rickydata.org/github/skill-analysis/trigger" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GATEWAY_INTERNAL_KEY }}" \
            -d '{
              "repo": "${{ github.repository }}",
              "sha": "${{ github.sha }}",
              "changedFiles": "${{ steps.changes.outputs.files }}",
              "commitMessage": "${{ github.event.head_commit.message }}"
            }' || echo "::warning::Skill analysis trigger failed (non-blocking)"
