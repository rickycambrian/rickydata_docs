server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  proxy_ssl_server_name on;

  location = /llms.txt {
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Docs-Host $host;
    proxy_set_header X-Docs-Proto https;
    proxy_pass __DOCS_API_URL__/api/public/llms.txt;
  }

  location ~ ^/docs/([^/]+)/llms\.txt$ {
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Docs-Host $host;
    proxy_set_header X-Docs-Proto https;
    proxy_pass __DOCS_API_URL__/api/public/docs/$1/llms.txt;
  }

  location / {
    try_files $uri /index.html;
  }
}
